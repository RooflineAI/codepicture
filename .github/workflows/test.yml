name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests with coverage
        run: |
          uv run pytest --cov --cov-report=xml --cov-report=term 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev fonts-jetbrains-mono

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run visual regression tests
        run: uv run pytest tests/visual/ -v --tb=short 2>&1 | tee visual-test-output.txt
        env:
          PANGOCAIRO_BACKEND: fontconfig

      - name: Upload diff composites on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-composites
          path: |
            /tmp/pytest-*/pytest-*/visual_diffs/
            visual-test-output.txt
          retention-days: 7
