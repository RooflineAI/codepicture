[project]
name = "codepicture"
version = "0.1.0"
description = "Generate beautiful images of source code"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/codepicture"]
